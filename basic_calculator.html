<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Calculator</h1>
    </header>
    <div id="main">
        <div class="game">
            <div id="row1" class="row">
                <div class="same">1</div>
                <div class="same">2</div>
                <div class="same">3</div>
                <div class="same">+</div>
            </div>
            <div id="row2" class="row">
                <div class="same">4</div>
                <div class="same">5</div>
                <div class="same">6</div>
                <div class="same">-</div>
            </div>
            <div id="row3" class="row">
                <div class="same">7</div>
                <div class="same">8</div>
                <div class="same">9</div>
                <div class="same">*</div>
            </div>
            <div id="row4" class="row">
                <div class="same">0</div>
                <div class="same">=</div>
                <div class="same">/</div>
            </div>
        </div>
        <div id="res">0</div>
        <div id="clear">CLEAR</div>
    </div>
    <script src="newscript.js"></script>
</body>

</html>
